<!DOCTYPE html>

<head>
<title>Gallery | SweetCrumbs</title>

<style>

body{
font-family: 'Segoe UI', sans-serif;
margin:0;
background:#f7f2f4;
color:#222;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:white;
}

.logo{
font-size:22px;
font-weight:bold;
color:#f0427c;
}

.nav-links a{
margin:0 15px;
text-decoration:none;
color:#333;
font-weight:600;
}

.nav-links a:hover{
color:#f0427c;
}

/* HEADER */

.header{
padding:60px;
}

.header h1{
font-size:40px;
margin-bottom:10px;
}

.header p{
color:#666;
max-width:500px;
}

/* FILTER BUTTONS */

.filters{
margin-top:30px;
}

.filters button{
border:none;
padding:10px 20px;
margin-right:10px;
border-radius:20px;
background:#eee;
cursor:pointer;
}

.filters button.active{
background:#f0427c;
color:white;
}

/* GALLERY GRID */

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
padding:0 60px 80px;
}

.gallery img{
width:100%;
border-radius:20px;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* PAGINATION */

.pagination{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:60px;
}

.pagination button{
border:none;
padding:10px 15px;
border-radius:50%;
background:#eee;
cursor:pointer;
}

.pagination .active{
background:#f0427c;
color:white;
}

/* FOOTER */

footer{
background:#111827;
color:white;
text-align:center;
padding:40px;
}
/* =========================
   RESPONSIVE DESIGN
   ========================= */

@media (max-width: 900px){

.container{
padding:0 20px;
}

/* NAVBAR */

.navbar .container{
flex-direction:column;
gap:15px;
text-align:center;
}

.nav-links{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.nav-links a{
margin:6px 10px;
}

/* HERO */

.hero-content{
grid-template-columns:1fr;
text-align:center;
}

.hero h1{
font-size:36px;
}

/* SECTIONS */

.why{
grid-template-columns:1fr;
text-align:center;
}

/* CARDS */

.dessert-grid{
grid-template-columns:1fr 1fr;
}

/* GALLERY */

.gallery{
grid-template-columns:1fr 1fr;
}

}

/* SMALL MOBILE */

@media (max-width:500px){

.hero h1{
font-size:28px;
}

.container{
padding:0 15px;
}

.dessert-grid{
grid-template-columns:1fr;
}

.gallery{
grid-template-columns:1fr;
}

.btn{
padding:8px 18px;
font-size:14px;
}

}
</style>

</head>
